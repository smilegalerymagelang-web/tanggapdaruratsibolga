<html>
    <head>
        
    <head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganti Password</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

/* Container */
.box {
    width: 100%;
    max-width: 400px;
    padding: 20px;
}

/* Card Form */
.form {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 30px 25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    color: #fff;
}

/* Title */
.form h3 {
    text-align: center;
    margin-bottom: 20px;
}

/* Username */
.inputbox h5 {
    font-weight: 400;
    margin-bottom: 10px;
}

/* Input */
.inputbox input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    margin-bottom: 15px;
    font-size: 14px;
}

/* Button */
.sub {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.sub:hover {
    background: #333;
    color: #fff;
}

/* Link */
.form a {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
}

.form a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
    .form {
        padding: 20px;
    }

    .form h3 {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<div class="box">
    <div class="form">
        <h3>🔐 Ganti Password</h3>

        <form onsubmit="return cekForm()">
            
            <div class="inputbox">
                <h5>Username Anda: <h3 id="user"></h3></h5>
                
            </div>

            <div class="inputbox">
                <input type="password" id="password" required placeholder="Password Baru">
            </div>

            <button type="submit" class="sub" onclick="clearInput()">Submit</button>

            <a href="home.html">⬅ Kembali</a>
        </form>
    </div>
</div>


       <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-app.js";
import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-database.js";

            // Firebase config
            const firebaseConfig = {
                apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
                authDomain: "backuptransksi.firebaseapp.com",
                databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "backuptransksi",
                storageBucket: "backuptransksi.firebasestorage.app",
                messagingSenderId: "205255091131",
                appId: "1:205255091131:web:05bb8036f0d93cbf621a9e"
            };

            // Init
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            // Ambil username dari localStorage
            const username = localStorage.getItem("username");

            // Tampilkan username ke layar
            if (username) {
                document.getElementById("user").textContent = username;
            } else {
                alert("User tidak ditemukan, silakan login ulang");
                window.location.href = "index.html";
            }

            // Submit form
            document.querySelector("form").addEventListener("submit", function(e) {
                e.preventDefault();

                const newPassword = document.getElementById("password").value;

                if (newPassword.length < 3) {
                    alert("Password minimal 3 karakter!");
                    return;
                }

                update(ref(db, "users/" + username), {
                    password: newPassword
                })
                .then(() => {
                    alert("Password berhasil diganti!, Jika ada kendala Hubungi Admin !");
                    document.getElementById("password").value = "";
                })
                .catch((error) => {
                    alert("Gagal update: " + error);
                });
            });
</script>
    </body>
</html>
