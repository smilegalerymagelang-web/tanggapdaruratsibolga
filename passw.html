<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:400px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h3{
    margin-bottom:10px;
}

.username{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

.input-group input:focus{
    border-color:#4facfe;
    box-shadow:0 0 5px rgba(79,172,254,0.5);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#007bff;
}

.link{
    margin-top:15px;
    display:block;
    text-decoration:none;
    color:#4facfe;
    font-size:14px;
}

.link:hover{
    text-decoration:underline;
}

@media(max-width:500px){
    .card{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h3>Ganti Password</h3>
        <div class="username">User: <b id="user"></b></div>

        <div class="input-group">
            <input type="password" id="newPassword" placeholder="Masukkan password baru">
        </div>

        <button id="submit">Simpan Password</button>

        <a href="home.html" class="link">← Kembali</a>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-app.js";
import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-database.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
  authDomain: "backuptransksi.firebaseapp.com",
  databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "backuptransksi",
  storageBucket: "backuptransksi.firebasestorage.app",
  messagingSenderId: "205255091131",
  appId: "1:205255091131:web:05bb8036f0d93cbf621a9e"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ambil username
const username = localStorage.getItem("username");

if (username) {
    document.getElementById("user").textContent = username;
}

// klik tombol
document.getElementById("submit").addEventListener("click", async function(){

    const newPass = document.getElementById("newPassword").value;

    if(!newPass){
        alert("Password tidak boleh kosong!");
        return;
    }

    if(newPass.length < 3){
        alert("Password minimal 3 karakter!");
        return;
    }

    try{
        await update(ref(db, "users/" + username), {
            password: newPass
        });

        alert("Password berhasil diubah!, jika terjadi kesulitan hubungi Admin..");
        document.getElementById("newPassword").value = "";
        window.location.href = "home.html";

    }catch(err){
        console.error(err);
        alert("Gagal update password!");
    }
});
</script>

</body>
</html>
