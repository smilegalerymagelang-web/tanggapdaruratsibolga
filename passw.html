<html>
    <head>
        <title>Change Password</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="box">
            <div class="form">
                <h3>Form Ganti Password</h3>
                <form onsubmit="return cekForm()">
                    <div class="inputbox">
                        <h5>Username Anda: <p id="user"></p></h5><br>
                     </div>
                    <div class="inputbox">
                        <input type="password" id="password"  required placeholder="Masukkan Password Baru">
                    </div>
                   <button type="submit" value="submit" class="sub" id="submit" onclick="clearInput()">Submit</button>
                    
                    <div>
                    <a href="home.html" style="font-size:17px;">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
        <script type="module">
               // Import the functions you need from the SDKs you need
            import { initializeApp } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-app.js";
            import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-database.js";
  
  // Your web app's Firebase configuration
            const firebaseConfig = {
             apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
                authDomain: "backuptransksi.firebaseapp.com",
                databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "backuptransksi",
                storageBucket: "backuptransksi.firebasestorage.app",
                messagingSenderId: "205255091131",
                appId: "1:205255091131:web:978ed2abb274747c621a9e",
                measurementId: "G-BR2J9886J7"
            };

  // Initialize Firebase
            const app = initializeApp(firebaseConfig);

   //get ref to database services
             const db = getDatabase(app);
             const username = localStorage.getItem("username");

             function clearInput(){
                document.getElementById("password").value = "";
                }   

             if (username) {
            document.getElementById("user").textContent = username;} //get cookies
             const garing = "/";

             document.getElementById("submit").addEventListener('click', function(e){

              e.preventDefault();
              set(ref(db, "users"+ garing+ document.getElementById("user").textContent),
              {
   
                username: document.getElementById("user").textContent,
                password: document.getElementById("password").value
                
                
              });
                alert("Password Baru Berhasil di Ganti !");
                document.getElementById("submit").style.display = "none";
             })
        </script>
    </body>
</html>
