<html>
    <head>
        <title>Change Password</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="box">
            <div class="form">
                <h3>Form Ganti Password</h3>
                <form onsubmit="return cekForm()">
                    <div class="inputbox">
                        <h5>Username Anda: <p id="user"></p></h5><br>
                     </div>
                    <div class="inputbox">
                        <input type="password" id="password"  required placeholder="Masukkan Password Baru">
                    </div>
                   <button type="submit" value="submit" class="sub" id="submit" onclick="clearInput()">Submit</button>
                    
                    <div>
                    <a href="home.html" style="font-size:17px;">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
        <script type="module">
               // Import the functions you need from the SDKs you need
            import { initializeApp } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-app.js";
            import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.19.1/firebase-database.js";
  
  // Your web app's Firebase configuration
            const firebaseConfig = {
             apiKey: "AIzaSyBnQl8uR6Dhb95-V2jJjqqaVE96lewT9RU",
            authDomain: "absen-periode-4-maret-2026.firebaseapp.com",
            databaseURL: "https://absen-periode-4-maret-2026-default-rtdb.firebaseio.com",
            projectId: "absen-periode-4-maret-2026",
            storageBucket: "absen-periode-4-maret-2026.firebasestorage.app",
            messagingSenderId: "853195810700",
            appId: "1:853195810700:web:44987fa2984bcf05b218a9",
            measurementId: "G-YKCEB5DEPK"
            };

  // Initialize Firebase
            const app = initializeApp(firebaseConfig);

   //get ref to database services
             const db = getDatabase(app);
             const username = localStorage.getItem("username");

             function clearInput(){
                document.getElementById("password").value = "";
                }   

             if (username) {
            document.getElementById("user").textContent = username;} //get cookies
             const garing = "/";

             document.getElementById("submit").addEventListener('click', function(e){

              e.preventDefault();
              set(ref(db, "users"+ garing+ document.getElementById("user").textContent),
              {
   
                username: document.getElementById("user").textContent,
                password: document.getElementById("password").value
                
                
              });
                alert("Password Baru Berhasil di Ganti !");
                document.getElementById("submit").style.display = "none";
             })
        </script>
    </body>
</html>
