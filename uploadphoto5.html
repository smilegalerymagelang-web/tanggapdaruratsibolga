<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview{
margin:15px 0;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#00aaff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

.progress{
width:100%;
background:#ddd;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:10px;
width:0%;
background:#00aaff;
border-radius:5px;
}

#loading{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner{
  width:50px;
  height:50px;
  border:6px solid #ddd;
  border-top:6px solid #00aaff;
  border-radius:50%;
  animation:putar 1s linear infinite;
}

@keyframes putar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}


</style>
<body>
<div class="container">
    <label for="imageFile">Klik Tombol untuk Ambil Photo: </label><br>
    <input type="file" id="imageFile" capture="user" accept="image/*" ><br><br>

    



    <div class="preview">
        <img id="preview" src="">
        
    </div>

    <div id="loading" style="display:none;">
        Uploading...
    </div>

    <a href="home.html" style="font-size:20px;">Kembali</a>

<button onclick="uploadPhoto()" id="btnupload">Upload</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
   
 // INPUT (UPLOAD) P H O T O
                document.getElementById("imageFile").value = "";
                const input = document.getElementById("imageFile");
                const preview = document.getElementById("preview");

                input.addEventListener("change", function() {
                const file = this.files[0];

                if (file) {
                    const url = URL.createObjectURL(file);
                    preview.src = url;
                    preview.style.display = "block";
                }
                });
 // Your web app's Firebase configuration
        const firebaseConfig = {
             apiKey: "AIzaSyBnQl8uR6Dhb95-V2jJjqqaVE96lewT9RU",
            authDomain: "absen-periode-4-maret-2026.firebaseapp.com",
            databaseURL: "https://absen-periode-4-maret-2026-default-rtdb.firebaseio.com",
            projectId: "absen-periode-4-maret-2026",
            storageBucket: "absen-periode-4-maret-2026.firebasestorage.app",
            messagingSenderId: "853195810700",
            appId: "1:853195810700:web:44987fa2984bcf05b218a9",
            measurementId: "G-YKCEB5DEPK"
            };

          firebase.initializeApp(firebaseConfig);


    async function uploadPhoto(){


    const file = document.getElementById("imageFile").files[0];

    if(!file){
        alert("Pilih foto dulu!");
        return;
    }
    loading.style.display = "block"; // tampilkan loading

    const formData = new FormData();

    // file utama
    formData.append("file", file);

    // upload preset dari Cloudinary
    formData.append("upload_preset", "Absen-wika");

    // PUBLIC ID UNIK (anti overwrite)
    const uniqueId = "foto_" + Date.now();
    formData.append("public_id", uniqueId);

    try {
        const response = await fetch("https://api.cloudinary.com/v1_1/deybh6pja/image/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        console.log("URL:", data.secure_url);

        // tampilkan gambar terbaru (anti cache)
        const imageUrl = data.secure_url + "?t=" + Date.now();
       
        const namabulan = [
        "Januari","Februari","Maret","April","Mei","Juni",
        "Juli","Agustus","September","Oktober","November","Desember"
        ];
        const now = new Date();
        const bulan = namabulan[now.getMonth()];
        const nama = localStorage.getItem("username");
        const jabatan = "Site Manager of Administratif";
        const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
        const tampilanBulan = now.getDate() + " " + bulan + " " + now.getFullYear();

         // SIMPAN KE FIREBASE
    firebase.database().ref("absen/"+tanggal).push({
       photo: imageUrl,
        waktu: now.getHours() + ":" + String(new Date().getMinutes()).padStart(2, '0') + ":" + now.getSeconds(),
        date: now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear(),
        nama : nama
     
    });

    firebase.database().ref("periode/"+nama).push({
       photo: imageUrl,
        waktu: now.getHours() + ":" + String(new Date().getMinutes()).padStart(2, '0') + ":" + now.getSeconds(),
        date: now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear(),
        nama : nama,
        tanggal:tampilanBulan
     
    });
       document.getElementById("btnupload").style.display = "none";
       loading.style.display = "none"; // hilangkan loading
         alert("Photo Berhasil di Upload !!");
       
        
     
    } catch (error){
        console.error("Upload gagal:", error);
    }
}
</script>
</body>
</html>
