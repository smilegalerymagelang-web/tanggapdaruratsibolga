<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selfie Photo</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview{
margin:15px 0;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#00aaff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

.progress{
width:100%;
background:#ddd;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:10px;
width:0%;
background:#00aaff;
border-radius:5px;
}

#loading{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner{
  width:50px;
  height:50px;
  border:6px solid #ddd;
  border-top:6px solid #00aaff;
  border-radius:50%;
  animation:putar 1s linear infinite;
}

@keyframes putar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}


</style>
</head>

<body>

    
<div class="container">
<p id="urlText"></p>
<h2>Selfie Photo</h2>

    
    <label for="imageFile">Klik Tombol untuk Ambil Photo: </label>
    <input type="file" id="imageFile" capture="user" accept="image/*" >

    <div class="preview">
        <img id="preview" src="">
    </div>

    <div id="loading" style="display:none;">
        Uploading...
    </div>

         

    <button id="btnupload" onclick="uploadImage()">Upload</button><br>
    
    
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
   
<a href="home.html" style="font-size:20px;">Kembali</a>



</div>


    
    
   
        <script>
                         // INPUT (UPLOAD) P H O T O
                const input = document.getElementById("imageFile");
                const preview = document.getElementById("preview");

                input.addEventListener("change", function() {
                const file = this.files[0];

                if (file) {
                    const url = URL.createObjectURL(file);
                    preview.src = url;
                    preview.style.display = "block";
                }
                });
        </script>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="app.js"></script>
</body>

</html>
