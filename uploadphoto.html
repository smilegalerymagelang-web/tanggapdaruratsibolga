<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Selfie Photo</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview{
margin:15px 0;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#00aaff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

.progress{
width:100%;
background:#ddd;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:10px;
width:0%;
background:#00aaff;
border-radius:5px;
}

#loading{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner{
  width:50px;
  height:50px;
  border:6px solid #ddd;
  border-top:6px solid #00aaff;
  border-radius:50%;
  animation:putar 1s linear infinite;
}

@keyframes putar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}


</style>
</head>
<body>

<div class="container">
<p id="urlText"></p>
<h2>Selfie Photo</h2>

    
    <label for="imageFile">Klik Tombol untuk Ambil Photo: </label>
    <input type="file" id="imageFile" capture="user" accept="image/*" >

    <div class="preview">
        <img id="preview" src="">
        
    </div>

    <div id="loading" style="display:none;">
        Uploading...
    </div>

         

    <button id="btnupload" onclick="uploadPhoto()">Upload</button><br>
    
    
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
   
<a href="home.html" style="font-size:20px;">Kembali</a>



</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>

 // INPUT (UPLOAD) P H O T O
                const input = document.getElementById("imageFile");
                const preview = document.getElementById("preview");

                input.addEventListener("change", function() {
                const file = this.files[0];

                if (file) {
                    const url = URL.createObjectURL(file);
                    preview.src = url;
                    preview.style.display = "block";
                }
                });

          firebase.initializeApp(firebaseConfig);


async function uploadPhoto(){

    const file = document.getElementById("imageFile").files[0];

    // cek jika file kosong 
if(!file){ 
  alert("Photo Selfie Masih Kosong !!,silahkan Ambil Photo Selfie.."); 
return; }

  loading.style.display = "block"; // tampilkan loading

    const now = new Date();
    const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
     const nama = localStorage.getItem("username");
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "Absen-wika");

    const response = await fetch("https://api.cloudinary.com/v1_1/deybh6pja/image/upload", {
        method: "POST",
        body: formData
    });
    
    const data = await response.json();

    const imageUrl = data.secure_url;

    // simpan ke firebase
    firebase.database().ref("safari/"+nama+"/"+tanggal).update({
        photo: imageUrl
    });

    loadPhoto();
}

function loadPhoto(){

const now = new Date();
const nama = localStorage.getItem("username");    
const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
firebase.database().ref("safari/"+nama+"/"+tanggal+"/photo").on("value", function(snapshot){

    let url = snapshot.val();

    
  
    // tampilan di Photo layar
    document.getElementById("preview2").src = url;

    const namabulan = [
    "Januari","Februari","Maret","April","Mei","Juni",
    "Juli","Agustus","September","Oktober","November","Desember"
    ];
    
  // tambahkan timestamp supaya tidak cache
    const imageUrl = url + "?t=" + new Date().getTime();
    
    const bulan = namabulan[now.getMonth()];
   
    const jabatan = "Site Manager of Administratif";
    const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
    const tampilanBulan = now.getDate() + " " + bulan + " " + now.getFullYear();

    // SIMPAN KE FIREBASE
    firebase.database().ref("absen/"+tanggal).push({
       photo: imageUrl,
        waktu: now.getHours() + ":" + String(new Date().getMinutes()).padStart(2, '0') + ":" + now.getSeconds(),
        date: now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear(),
        nama : nama
     
    });

    firebase.database().ref("periode/"+nama).push({
       photo: imageUrl,
        waktu: now.getHours() + ":" + String(new Date().getMinutes()).padStart(2, '0') + ":" + now.getSeconds(),
        date: now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear(),
        nama : nama,
        tanggal:tampilanBulan
     
    });

    loading.style.display = "none"; // hilangkan loading
    alert("Photo Berhasil di Upload !!");
     document.getElementById("btnupload").style.display = "none";
    
   
});

}

   
</script>

</html>
