<head>

 <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .loader{
            border:8px solid #f3f3f3;
            border-top:8px solid #3498db;
            border-radius:50%;
            width:60px;
            height:60px;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            0%{ transform:rotate(0deg); }
            100%{ transform:rotate(360deg); }
        }

    body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.preview{
margin:15px 0;
}

.preview img{
width:100%;
max-height:250px;
object-fit:cover;

}

button{
width:100%;
padding:10px;
border:none;
background:#00aaff;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

.progress{
width:100%;
background:#ddd;
border-radius:5px;
margin-top:10px;
}

.progress-bar{
height:10px;
width:0%;
background:#00aaff;
border-radius:5px;
}

#loading{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner{
  width:50px;
  height:50px;
  border:6px solid #ddd;
  border-top:6px solid #00aaff;
  border-radius:50%;
  animation:putar 1s linear infinite;
}

@keyframes putar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

    ];
