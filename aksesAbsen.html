<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<p id="nama"></p>
<p id="tanggal"></p>
<div id="nama" ></div>

</head>



<body>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
            authDomain: "backuptransksi.firebaseapp.com",
            databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "backuptransksi",
            storageBucket: "backuptransksi.firebasestorage.app",
            messagingSenderId: "205255091131",
            appId: "1:205255091131:web:05bb8036f0d93cbf621a9e",
            measurementId: "G-QFJDCS967X"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ambil username dari localStorage
const nama = localStorage.getItem("username");

// buat tanggal (24032026)
const now = new Date();
const tanggal = now.getDate().toString().padStart(2,'0') +
                (now.getMonth() + 1).toString().padStart(2,'0') +
                now.getFullYear();

// ambil data dari Firebase
db.ref("absen/"+tanggal+"/"+nama).once("value", function(snapshot){

    const data = snapshot.val();

    if(data){
        // tampilkan nama ke HTML
        document.getElementById("nama").innerHTML = data.nama;
     
        // ALERT jika data sudah ada
        Swal.fire({
            icon: "info",
            title: "Absensi Pulang",
            text: "pilih Proses untuk melanjutkan..",
            showCancelButton: true,
            confirmButtonText: "Proses",
            cancelButtonText: "Kembali"
        }).then((result) => {
            if (result.isConfirmed) {

                // pindah halaman
                window.location.href = "checkAbsenPulang.html";
                
            } else {
                // bisa ke halaman lain juga
                window.location.href = "home.html";
            }
        });

    }else{
        // ❌ jika data BELUM ADA
       window.location.href = "uploadphoto5.html";
    }

});
</script>



</body>
</html>
