<body>

<div id="jam"></div>
<script>
function waktuIndonesia(){

    const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const bulan = ["Januari","Februari","Maret","April","Mei","Juni",
                   "Juli","Agustus","September","Oktober","November","Desember"];

    const sekarang = new Date();

    let h = hari[sekarang.getDay()];
    let t = sekarang.getDate();
    let b = bulan[sekarang.getMonth()];
    let th = sekarang.getFullYear();

    let jam = String(sekarang.getHours()).padStart(2,'0');
    let menit = String(sekarang.getMinutes()).padStart(2,'0');
    let detik = String(sekarang.getSeconds()).padStart(2,'0');

    document.getElementById("jam").innerHTML =
        h + ", " + t + " " + b + " " + th + "<br>" +"pkl. " +
        jam + ":" + menit + ":" + detik + " wib";
}

setInterval(waktuIndonesia,1000);
</script>

</head>

<div class="table-container">
<table>

<thead>
<tr>
<th style="text-align:center; vertical-align:middle; height:50; width:50; object-fit:cover">Photo</th>
<th>Jam Masuk Kerja</th>
<th style="text-align:center; vertical-align:middle;">Nama</th>


</tr>

<tbody id="isiData">

<script type="module">

 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  // Your web app's Firebase configuration
            const firebaseConfig = {
             apiKey: "AIzaSyBnQl8uR6Dhb95-V2jJjqqaVE96lewT9RU",
                authDomain: "absen-periode-4-maret-2026.firebaseapp.com",
                databaseURL: "https://absen-periode-4-maret-2026-default-rtdb.firebaseio.com",
                projectId: "absen-periode-4-maret-2026",
                storageBucket: "absen-periode-4-maret-2026.firebasestorage.app",
                messagingSenderId: "853195810700",
                appId: "1:853195810700:web:44987fa2984bcf05b218a9",
                measurementId: "G-YKCEB5DEPK"
            };


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const now = new Date();
const pukul = "pkl. ";
const wib = " .wib";
const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();

const dbRef = ref(db, "absen/"+tanggal);

onValue(dbRef, (snapshot) => {

    const data = snapshot.val();
    let html = "";

    for (let key in data){

        html += `
        <tr>
        <td style='text-align:center;'><img src="${data[key].photo.replace(/\\\//g, "/")}" width="50"></td>
        <td >${pukul} ${data[key].waktu.replace(/"/g, '')} ${wib}</td>
        <td style='text-align:center; vertical-align:middle;'>${data[key].nama.replace(/"/g, '')}</td>
      
        </tr>
        `;

    }

    document.getElementById("isiData").innerHTML = html;

});

</script>
