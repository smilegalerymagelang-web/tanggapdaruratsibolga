    for (let key in data){

        html += `
        <tr>
         <td style="text-align:center;">${no}</td>
        <td style='text-align:center; vertical-align:middle;'>${data[key].nama}</td>
        <td style='text-align:center; vertical-align:middle;'>${pukul} ${data[key].waktu} ${wib}</td>
        <td style='text-align:center;'><img src="${data[key].photo}" class="photoTable"onclick="preview(this.src)"></td>
        </tr>
        `;
   no++;
    }
   }
    document.getElementById("isiData").innerHTML = html;

});
 
</script>
</body>
</html>
