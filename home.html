<script>
document.getElementById("submitBtn").addEventListener("click", function(e) {
    const now = new Date();
    const hour = now.getHours();

    if (hour < 17) {
        e.preventDefault();
         Swal.fire({
            position: 'top-end',
            icon: 'warning',
            title: 'Absensi Pulang dilakukan setelah jam 17:00 wib',
            showConfirmButton: false,
            timer: 4000
})
       
    } else {
         Swal.fire({
            position: 'top-end',
            icon: 'success',
            title: 'Terima kasih, Absensi Pulang Berhasil di Proses !',
            showConfirmButton: false,
            timer: 3000
})
    }
});

function waktuIndonesia(){

    const hari = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const bulan = ["Januari","Februari","Maret","April","Mei","Juni",
                   "Juli","Agustus","September","Oktober","November","Desember"];

    const sekarang = new Date();

    let h = hari[sekarang.getDay()];
    let t = sekarang.getDate();
    let b = bulan[sekarang.getMonth()];
    let th = sekarang.getFullYear();

    let jam = String(sekarang.getHours()).padStart(2,'0');
    let menit = String(sekarang.getMinutes()).padStart(2,'0');
    let detik = String(sekarang.getSeconds()).padStart(2,'0');

    document.getElementById("jam").innerHTML =
        h + ", " + t + " " + b + " " + th + "<br>" +"pkl. " +
        jam + ":" + menit + ":" + detik + " wib";
}

setInterval(waktuIndonesia,1000);
</script>

<script type="module">

 import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  // Your web app's Firebase configuration
            const firebaseConfig = {
             apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
            authDomain: "backuptransksi.firebaseapp.com",
            databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "backuptransksi",
            storageBucket: "backuptransksi.firebasestorage.app",
            messagingSenderId: "205255091131",
            appId: "1:205255091131:web:05bb8036f0d93cbf621a9e",
            measurementId: "G-QFJDCS967X"
            };


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const now = new Date();
const pukul = "pkl. ";
const wib = " .wib";
const tanggal = now.getDate()+String(new Date().getMonth() + 1).padStart(2,'0')+now.getFullYear();
let currentPage = 1;
let rowsPerPage = 5; // jumlah data per halaman
let allData = [];

document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#isiData tr");



    rows.forEach(function(row) {
        let text = row.innerText.toLowerCase();
        if (text.includes(filter)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
});

const dbRef = ref(db, "absen/"+tanggal);

onValue(dbRef, (snapshot) => {

    const data = snapshot.val();

    if (!data) {
        document.getElementById("isiData").innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center; padding:10px;">
                Data Belum Tersedia !
            </td>
        </tr>`;
        return;
    }

    allData = Object.values(data);
    currentPage = 1; // reset halaman saat load data

    renderTable();
});
    function renderTable() {

    let start = (currentPage - 1) * rowsPerPage;
    let end = start + rowsPerPage;
    let paginatedData = allData.slice(start, end);

    let html = "";
    let no = start + 1;

    paginatedData.forEach(item => {
        html += `
        <tr>
         <td style="text-align:center;">${no}</td>
         <td style='text-align:center;'>
            <img src="${item.photo}" class="photoTable" onclick="previewFoto(this.src)">
         </td>
         <td style='text-align:center;'>${item.nama}</td>
         <td style='text-align:center;'>
    <span class="badge masuk">
        ${item.waktu ? item.waktu : "-"}
    </span>
</td>

<td style='text-align:center;'>
    <span class="badge ${item.pulang === "-" ? "belum" : "pulang"}">
        ${item.pulang === "-" ? "- " : item.pulang}
    </span>
</td>
        </tr>
        `;
        no++;
    });

    document.getElementById("isiData").innerHTML = html;

    renderPagination();
}

function renderPagination() {

    const totalPages = Math.ceil(allData.length / rowsPerPage);

    let html = `
        <button onclick="prevPage()" ${currentPage === 1 ? "disabled" : ""}>Prev</button>
        Halaman ${currentPage} / ${totalPages}
        <button onclick="nextPage()" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
    `;

    document.getElementById("pagination").innerHTML = html;
}

function nextPage() {
    const totalPages = Math.ceil(allData.length / rowsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
}

window.nextPage = function() {
    const totalPages = Math.ceil(allData.length / rowsPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderTable();
    }
}

window.prevPage = function() {
    if (currentPage > 1) {
        currentPage--;
        renderTable();
    }
}
</script>
