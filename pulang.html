<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    const now = new Date();
const hour = now.getHours();

if (hour < 24) {
    e.preventDefault();

    Swal.fire({
        position: 'top-end',
        icon: 'warning',
        title: 'Absensi Pulang dilakukan setelah jam 17:00 WIB',
        showConfirmButton: false,
        timer: 4000
    });

} else {
    // Lanjut ke halaman (contoh redirect)
    Swal.fire({
        position: 'top-end',
        icon: 'warning',
        title: 'ssssssss',
        showConfirmButton: false,
        timer: 4000
    });

  
}

</script>

</body>
</html>
