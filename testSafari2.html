<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<label for="imageFile">Klik Tombol untuk Ambil Photo: </label>
<input type="file" id="imageFile" capture="user" accept="image/*" >


<button onclick="uploadPhoto()">Upload</button>

<img id="preview" width="200">

        



<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>

 // INPUT (UPLOAD) P H O T O
                const input = document.getElementById("imageFile");
                const preview = document.getElementById("preview");

                input.addEventListener("change", function() {
                const file = this.files[0];

                if (file) {
                    const url = URL.createObjectURL(file);
                    preview.src = url;
                    preview.style.display = "block";
                }
                });

 // Your web app's Firebase configuration
        const firebaseConfig = {
             apiKey: "AIzaSyC0D0j5H_er4TYdRdQj7xqCiTCSas30YY0",
            authDomain: "backuptransksi.firebaseapp.com",
            databaseURL: "https://backuptransksi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "backuptransksi",
            storageBucket: "backuptransksi.firebasestorage.app",
            messagingSenderId: "205255091131",
            appId: "1:205255091131:web:05bb8036f0d93cbf621a9e",
          
            };

         const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


// =======================
// UPLOAD PHOTO
// =======================
window.uploadPhoto = async function(){

    const file = document.getElementById("imageFile").files[0];
    if(!file){
        alert("Pilih foto dulu");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "Absen-wika");

    const response = await fetch(
        "https://api.cloudinary.com/v1_1/deybh6pja/image/upload",
        {
            method: "POST",
            body: formData
        }
    );

    const data = await response.json();

    // Tambahkan timestamp supaya anti cache
    const photoUrl = data.secure_url + "?t=" + new Date().getTime();

    // SIMPAN KE FIREBASE
    await set(ref(db,"safari/photo"),{
        url: photoUrl,
        update: Date.now()
    });

};



// =======================
// REALTIME PHOTO UPDATE
// =======================

const photoRef = ref(db,"safari/photo");

onValue(photoRef,(snapshot)=>{

    const data = snapshot.val();

    if(data){

        // paksa reload image (anti cache)
        const img = document.getElementById("photo");
        img.src = data.url + "&nocache=" + Date.now();

    }

});

</script>
</body>
</html>
