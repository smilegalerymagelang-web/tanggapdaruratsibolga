const tableBody = document.getElementById("tableBody");

/* AUTO STATUS */
function getStatus(jam) {
  const [h, m] = jam.split(":").map(Number);
  const total = h * 60 + m;

  if (total <= 8 * 60) return "masuk pukul : 8:12 wib";
  if (total > 8 * 60 && total < 17 * 60) return "belum hadir";
  return "tidak masuk kerja";
}

/* RENDER TABLE */
data.forEach((item, index) => {
  const status = getStatus(item.jam);

  const row = `
    <tr>
      <td data-label="Foto">
        <img src="${item.foto}" class="img-thumb" onclick="previewImage(${index})">
      </td>
      <td data-label="Nama">${item.nama}</td>
      <td data-label="Status">
        <span class="badge ${status}">${status}</span>
      </td>
    </tr>
  `;
  tableBody.innerHTML += row;
});

/* PREVIEW + SWIPE */
let currentIndex = 0;

function previewImage(index) {
  currentIndex = index;
  showImage();
}

function showImage() {
  Swal.fire({
    html: `
      <div style="position:relative">
        <img id="previewImg" src="${data[currentIndex].foto}" 
             style="width:100%; border-radius:10px;">
        
        <button onclick="prevImage()" style="position:absolute;left:0;top:50%">⬅️</button>
        <button onclick="nextImage()" style="position:absolute;right:0;top:50%">➡️</button>
      </div>
    `,
    showConfirmButton: false,
    background: "transparent",
    backdrop: "rgba(0,0,0,0.8)"
  });

  addZoom();
}

/* NEXT / PREV */
function nextImage() {
  currentIndex = (currentIndex + 1) % data.length;
  showImage();
}

function prevImage() {
  currentIndex = (currentIndex - 1 + data.length) % data.length;
  showImage();
}

/* ZOOM FUNCTION */
function addZoom() {
  setTimeout(() => {
    const img = document.getElementById("previewImg");

    let scale = 1;

    img.addEventListener("wheel", (e) => {
      e.preventDefault();
      scale += e.deltaY * -0.001;
      scale = Math.min(Math.max(1, scale), 3);
      img.style.transform = `scale(${scale})`;
    });
  }, 300);
}
</script>
